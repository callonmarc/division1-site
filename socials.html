<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Socials</title>
  <meta name="description" content="Division 1 contact page with clean social and contact placeholders.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="socials">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a class="is-active" href="socials.html">Socials</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro contact-intro">
        <p class="eyebrow">Socials</p>
        <h1>Stay tapped in.</h1>
      </section>

      <section class="contact-grid" aria-label="Social and contact links">
        <article class="contact-card">
          <span class="contact-label">Instagram</span>
          <h2>@divisiononone</h2>
          <a class="button button-secondary" href="https://instagram.com/divisiononone" target="_blank" rel="noopener noreferrer">Follow on Instagram</a>
        </article>
        <article class="contact-card">
          <span class="contact-label">Email</span>
        </article>
        <article class="contact-card">
          <span class="contact-label">TikTok</span>
        </article>
      </section>
    </main>
  </div>

</body>
</html>
