<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Gallery</title>
  <meta name="description" content="Division 1 gallery page with framed placeholders for future model and behind-the-scenes imagery.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="gallery">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a class="is-active" href="gallery.html">Gallery</a>
        <a href="socials.html">Socials / Contact</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro">
        <p class="eyebrow">Gallery</p>
        <h1>Future photo wall.</h1>
      </section>

      <section class="gallery-grid" aria-label="Gallery placeholders">
        <article class="gallery-card gallery-card-tall"><span>Model photo</span></article>
        <article class="gallery-card"><span>BTS photo</span></article>
        <article class="gallery-card"><span>Street shot</span></article>
        <article class="gallery-card gallery-card-wide"><span>Editorial pic</span></article>
        <article class="gallery-card"><span>Backstage pic</span></article>
      </section>
    </main>
  </div>

</body>
</html>
