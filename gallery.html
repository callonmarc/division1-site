<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Gallery</title>
  <meta name="description" content="Division 1 gallery page with framed placeholders for future model and behind-the-scenes imagery.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="gallery">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a class="is-active" href="gallery.html">Gallery</a>
        <a href="socials.html">Socials</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro">
        <p class="eyebrow">Gallery</p>
        <h1>Pinned moments.</h1>
      </section>

      <section class="gallery-grid" aria-label="Division 1 gallery">
        <article class="gallery-card gallery-card-tall gallery-note note-tilt-left">
          <img src="images/model.jpg" alt="Model wearing Division 1 apparel">
        </article>
        <article class="gallery-card gallery-note note-tilt-right">
          <img src="images/model2.jpg" alt="Second model photo in Division 1 apparel">
        </article>
        <article class="gallery-card gallery-note note-tilt-left">
          <img src="images/shirt1.png" alt="Division 1 shirt product still image">
        </article>
        <article class="gallery-card gallery-card-wide gallery-note note-tilt-right">
          <img src="images/shirt2.png" alt="Division 1 shirt variation image">
        </article>
        <article class="gallery-card gallery-note note-tilt-left">
          <img src="images/shirt3.png" alt="Division 1 shirt detail image">
        </article>
        <article class="gallery-card gallery-note note-tilt-right">
          <img src="images/shirt4.png" alt="Division 1 shirt alternate color image">
        </article>
        <article class="gallery-card gallery-note note-tilt-left">
          <img src="images/model.jpg" alt="Model portrait in Division 1 clothing">
        </article>
        <article class="gallery-card gallery-note note-tilt-right">
          <img src="images/model2.jpg" alt="Candid model shot wearing Division 1 brand">
        </article>
      </section>
    </main>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
