<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Shop</title>
  <meta name="description" content="Division 1 shop page with four shirt placeholders for future product imagery.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="shop">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a class="is-active" href="shop.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="socials.html">Socials / Contact</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro">
        <p class="eyebrow">Shop</p>
        <h1>Current placeholders.</h1>
      </section>

      <section class="product-grid" aria-label="Shirt placeholders">
        <article class="product-card">
          <div class="placeholder-box" aria-hidden="true"><span>Image coming soon</span></div>
          <h2>Shirt 1</h2>
          <p class="price-text">Price</p>
        </article>
        <article class="product-card">
          <div class="placeholder-box" aria-hidden="true"><span>Image coming soon</span></div>
          <h2>Shirt 2</h2>
          <p class="price-text">Price</p>
        </article>
        <article class="product-card">
          <div class="placeholder-box" aria-hidden="true"><span>Image coming soon</span></div>
          <h2>Shirt 3</h2>
          <p class="price-text">Price</p>
        </article>
        <article class="product-card">
          <div class="placeholder-box" aria-hidden="true"><span>Image coming soon</span></div>
          <h2>Shirt 4</h2>
          <p class="product-copy">Drop preview</p>
          <p class="price-text">Price</p>
        </article>
      </section>
    </main>
  </div>

</body>
</html>
