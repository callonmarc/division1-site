<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Shop</title>
  <meta name="description" content="Division 1 shop page with four shirt placeholders for future product imagery.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="shop">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a class="is-active" href="shop.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="socials.html">Socials</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro shop-intro">
        <p class="eyebrow">Division 1 Shop</p>
      </section>

      <section class="cart-panel" aria-live="polite">
        <div class="cart-panel-header">
          <p class="eyebrow">Cart</p>
          <p class="cart-count"><span data-cart-count>0</span> items</p>
        </div>
        <div class="cart-body">
          <p class="cart-empty" data-cart-empty>Your cart is empty.</p>
          <ul class="cart-items" data-cart-items></ul>
          <p class="cart-total">Total: <strong data-cart-total>$0.00</strong></p>
        </div>
      </section>

      <section class="product-grid shop-grid" aria-label="Division 1 shirt drop">
        <article class="product-card" data-product-card>
          <p class="product-tag">D1</p>
          <div class="shirt-stage">
            <div class="shirt-image-wrap">
              <img class="shirt-image" src="images/shirt1.png" alt="Shirt 1 product image">
            </div>
          </div>
          <div class="product-meta">
            <h2>Shirt 1</h2>
            <p class="price-text">$45.00</p>
          </div>
          <button class="add-to-cart-button" type="button" data-add-to-cart data-name="Shirt 1" data-price="45">Add to cart</button>
        </article>
        <article class="product-card" data-product-card>
          <p class="product-tag">D1</p>
          <div class="shirt-stage">
            <div class="shirt-image-wrap">
              <img class="shirt-image" src="images/shirt2.png" alt="Shirt 2 product image">
            </div>
          </div>
          <div class="product-meta">
            <h2>Shirt 2</h2>
            <p class="price-text">$48.00</p>
          </div>
          <button class="add-to-cart-button" type="button" data-add-to-cart data-name="Shirt 2" data-price="48">Add to cart</button>
        </article>
        <article class="product-card" data-product-card>
          <p class="product-tag">D1</p>
          <div class="shirt-stage">
            <div class="shirt-image-wrap">
              <img class="shirt-image" src="images/shirt3.png" alt="Shirt 3 product image">
            </div>
          </div>
          <div class="product-meta">
            <h2>Shirt 3</h2>
            <p class="price-text">$50.00</p>
          </div>
          <button class="add-to-cart-button" type="button" data-add-to-cart data-name="Shirt 3" data-price="50">Add to cart</button>
        </article>
        <article class="product-card" data-product-card>
          <p class="product-tag">D1</p>
          <div class="shirt-stage">
            <div class="shirt-image-wrap">
              <img class="shirt-image" src="images/shirt4.png" alt="Shirt 4 product image">
            </div>
          </div>
          <div class="product-meta">
            <h2>Shirt 4</h2>
            <p class="price-text">$52.00</p>
          </div>
          <button class="add-to-cart-button" type="button" data-add-to-cart data-name="Shirt 4" data-price="52">Add to cart</button>
        </article>
      </section>
    </main>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
