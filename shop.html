<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Shop</title>
  <meta name="description" content="Division 1 shop page with four shirt placeholders for future product imagery.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .shirt-image-wrap {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 18rem;
      margin: 0 auto;
    }

    .shirt-image-wrap::before {
      content: "";
      position: absolute;
      width: 72%;
      height: 72%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 31, 181, 0.75) 0%, rgba(255, 31, 181, 0.45) 45%, rgba(255, 31, 181, 0) 100%);
      filter: blur(12px);
      z-index: 0;
    }

    .shirt-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(255, 31, 181, 0.7));
    }
  </style>
</head>
<body data-page="shop">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a class="is-active" href="shop.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="socials.html">Socials</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro">
        <p class="eyebrow">Shop</p>
        <h1>Current placeholders.</h1>
      </section>

      <section class="product-grid" aria-label="Shirt placeholders">
        <article class="product-card">
          <div class="shirt-image-wrap">
            <img class="shirt-image" src="images/shirt1.png" alt="Shirt 1 product image">
          </div>
          <h2>Shirt 1</h2>
          <p class="price-text">Price</p>
        </article>
        <article class="product-card">
          <div class="shirt-image-wrap">
            <img class="shirt-image" src="images/shirt2.png" alt="Shirt 2 product image">
          </div>
          <h2>Shirt 2</h2>
          <p class="price-text">Price</p>
        </article>
        <article class="product-card">
          <div class="shirt-image-wrap">
            <img class="shirt-image" src="images/shirt3.png" alt="Shirt 3 product image">
          </div>
          <h2>Shirt 3</h2>
          <p class="price-text">Price</p>
        </article>
        <article class="product-card">
          <div class="shirt-image-wrap">
            <img class="shirt-image" src="images/shirt4.png" alt="Shirt 4 product image">
          </div>
          <h2>Shirt 4</h2>
          <p class="product-copy">Drop preview</p>
          <p class="price-text">Price</p>
        </article>
      </section>
    </main>
  </div>

</body>
</html>
