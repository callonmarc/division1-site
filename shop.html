<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division 1 | Shop</title>
  <meta name="description" content="Division 1 shop page featuring the current shirt drop.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="shop">
  <div class="background-image" aria-hidden="true"></div>
  <div class="lightning-layer" aria-hidden="true">
    <span class="fog-bank"></span>
    <span class="lightning-bolt bolt-one"></span>
    <span class="lightning-bolt bolt-two"></span>
    <span class="lightning-bolt bolt-three"></span>
  </div>
  <div class="page-overlay"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Division 1 home">
        <img class="brand-logo" src="images/division1.jpg" alt="Division 1 logo">
        <span class="brand-mark">Division 1</span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a class="is-active" href="shop.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="socials.html">Socials</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-intro shop-intro">
        <p class="eyebrow">Division 1 Shop</p>
      </section>

      <section class="cart-panel" aria-live="polite">
        <div class="cart-panel-header">
          <p class="eyebrow">Cart</p>
          <p class="cart-count"><span data-cart-count>0</span> items</p>
        </div>
        <div class="cart-body">
          <p class="cart-empty" data-cart-empty>Your cart is empty.</p>
          <ul class="cart-items" data-cart-items></ul>
          <p class="cart-total">Total: <strong data-cart-total>$0.00</strong></p>
          <button class="cart-checkout-link" type="button" data-checkout-button>Checkout Cart</button>
        </div>
      </section>

      <section class="product-grid shop-grid" aria-label="Division 1 shirt drop">
        <article class="product-card" data-product-card>
          <p class="product-tag">D1</p>
          <div class="shirt-stage">
            <div class="shirt-carousel" role="region" aria-label="Rock and Roll shirt image gallery">
              <div class="shirt-image-wrap">
                <img class="shirt-image" src="images/shirt1.png" alt="Rock and Roll shirt product image 1 of 2">
              </div>
              <div class="shirt-image-wrap">
                <img class="shirt-image" src="images/div1 shirt1.jpg" alt="Rock and Roll shirt alternate image 2 of 2">
              </div>
            </div>
          </div>
          <div class="product-meta">
            <h2>rock &amp; roll</h2>
            <p class="price-text">$35.00</p>
          </div>
          <label class="size-selector">
            <span>Size</span>
            <select data-size-selector aria-label="Select Rock and Roll Shirt size" required>
              <option value="">Select size</option>
              <option value="Small">Small</option>
              <option value="Med">Med</option>
              <option value="Large">Large</option>
              <option value="XL">XL</option>
            </select>
          </label>
          <button class="add-to-cart-button" type="button" data-add-to-cart data-name="Rock &amp; Roll Shirt" data-price="35" data-price-id="price_REPLACE_ROCK_ROLL_SHIRT">Add to cart</button>
        </article>
        <article class="product-card" data-product-card>
          <p class="product-tag">D1</p>
          <div class="shirt-stage">
            <div class="shirt-carousel" role="region" aria-label="No Tomorrow shirt image gallery">
              <div class="shirt-image-wrap">
                <img class="shirt-image" src="images/shirt3.png" alt="No Tomorrow shirt product image 1 of 2">
              </div>
              <div class="shirt-image-wrap">
                <img class="shirt-image" src="images/div1 shirt3.jpg" alt="No Tomorrow shirt alternate image 2 of 2">
              </div>
            </div>
          </div>
          <div class="product-meta">
            <h2>no tomorrow</h2>
            <p class="price-text">$30.00</p>
          </div>
          <label class="size-selector">
            <span>Size</span>
            <select data-size-selector aria-label="Select No Tomorrow Shirt size" required>
              <option value="">Select size</option>
              <option value="Small">Small</option>
              <option value="Med">Med</option>
              <option value="Large">Large</option>
              <option value="XL">XL</option>
            </select>
          </label>
          <button class="add-to-cart-button" type="button" data-add-to-cart data-name="No Tomorrow Shirt" data-price="30" data-price-id="price_REPLACE_NO_TOMORROW_SHIRT">Add to cart</button>
        </article>
      </section>
    </main>
  </div>
  <aside class="cart-toast" data-cart-toast role="status" aria-live="polite" aria-atomic="true"></aside>
  <script src="script.js" defer></script>
</body>
</html>
